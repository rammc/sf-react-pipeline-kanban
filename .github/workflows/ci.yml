name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: force-app/main/default/uiBundles/pipelineKanban

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: force-app/main/default/uiBundles/pipelineKanban/package-lock.json

      # `npm ci` triggers the postinstall hook → patch-package applies
      # the @salesforce/ui-bundle proxy fixes. No org needed.
      - run: npm ci

      - run: npm run lint

      - run: npx vitest run
